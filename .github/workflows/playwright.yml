name: Playwright

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        project: [desktop, tablet, mobile]

    env:
      CI: true
      NOTIFICATIONS_ENABLED: false
      NEXT_PUBLIC_DEV_MODE: true
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ENROLLMENT_HOLD_MINUTES: 15
      CRON_SECRET: ci-cron-secret-not-real
      # Stripe-touching tests skip if these are unset (see tests/payment-e2e.spec.ts).
      # To run them in CI, set repo secrets STRIPE_SECRET_KEY (test) + STRIPE_WEBHOOK_SECRET (test).
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations + seed)
        run: supabase start --workdir .

      - name: Export Supabase env from local stack
        run: |
          STATUS=$(supabase status -o json --workdir .)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for app to be ready
        run: npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - name: Run pgTAP RLS tests (desktop job only)
        if: matrix.project == 'desktop'
        run: supabase test db --workdir .

      - name: Stop Supabase
        if: always()
        run: supabase stop --workdir .
