name: Sync staging with main

# Keeps the long-lived `staging` branch fast-forwarded to `main` so the staging
# Vercel deploy (dev-sailbook.vercel.app, Preview env vars, staging Supabase)
# always reflects the latest production code. The Stripe test webhook URL is
# pinned to dev-sailbook.vercel.app, so this branch must move forward whenever
# main does.
#
# Failure mode: if `staging` ever diverges from `main` (someone pushed
# directly to staging), --ff-only errors out and the workflow fails. Resolve
# by hand: `git checkout staging && git reset --hard origin/main && git push
# --force-with-lease`.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fast-forward:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward staging to main
        run: |
          git fetch origin main
          git merge --ff-only origin/main
          git push origin staging
