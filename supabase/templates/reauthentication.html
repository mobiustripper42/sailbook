<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your SailBook security code</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f6f8;font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#1a1f2c;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;background-color:#ffffff;border-radius:2px;border:1px solid #e3e8ef;">
            <tr>
              <td style="padding:32px 32px 16px 32px;">
                <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;line-height:1.3;color:#0c2a4a;">Confirm it&rsquo;s you</h1>
                <p style="margin:0;font-size:15px;line-height:1.5;color:#3a4458;">
                  Use the code below to confirm a sensitive change on your SailBook account.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 24px 32px;" align="center">
                <p style="margin:0;font-size:32px;font-weight:700;letter-spacing:0.25em;color:#0c2a4a;">
                  {{ .Token }}
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 32px 32px;border-top:1px solid #e3e8ef;">
                <p style="margin:0;font-size:12px;line-height:1.5;color:#7a8398;">
                  This code expires in 10 minutes. Didn&rsquo;t ask for it? You can ignore this email.
                </p>
              </td>
            </tr>
          </table>
          <p style="margin:16px 0 0 0;font-size:12px;color:#7a8398;">SailBook &middot; Simply Sailing</p>
        </td>
      </tr>
    </table>
  </body>
</html>
